<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | School Management System</title>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --primary: #0d9488; --success: #059669; --danger: #dc2626; --warning: #d97706; --text: #1e293b; --text-light: #64748b; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        body { background: var(--bg); min-height: 100vh; }
        .header { background: white; border-bottom: 1px solid var(--border); padding: 14px 28px; display: flex; justify-content: space-between; align-items: center; }
        .header .brand { font-size: 16px; font-weight: 700; color: var(--text); } .header a { text-decoration: none; color: var(--primary); font-weight: 600; font-size: 13px; }
        .main { max-width: 700px; margin: 0 auto; padding: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        .card h3 { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 16px; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 10px; font-weight: 700; color: var(--text); text-transform: uppercase; margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 11px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; background: #f8fafc; }
        .btn { padding: 10px 18px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; color: white; }
        .btn-primary { background: var(--primary); } .btn-success { background: var(--success); } .btn-danger { background: var(--danger); } .btn-warning { background: var(--warning); color: #1e293b; }
        .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
        .toast { position: fixed; top: 24px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 14px 28px; border-radius: 50px; font-size: 14px; z-index: 1000; display: none; animation: slideDown 0.3s; }
        @keyframes slideDown { from { transform: translateX(-50%) translateY(-80px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
    </style>
</head>
<body>
    <div class="header"><div class="brand">🏫 School<span>Manager</span> — Settings</div><a href="../dashboard.html">← Dashboard</a></div>
    <div class="main">
        <div class="card"><h3>🏫 School Information</h3>
            <div class="form-group"><label>School Name</label><input type="text" id="schoolName" placeholder="e.g., Living Spring Adventist Academy"></div>
            <div class="form-group"><label>School Address</label><input type="text" id="schoolAddress" placeholder="School address"></div>
            <div class="form-group"><label>School Phone</label><input type="text" id="schoolPhone" placeholder="Phone number"></div>
            <div class="form-group"><label>School Email</label><input type="email" id="schoolEmail" placeholder="Email address"></div>
            <button class="btn btn-primary" onclick="saveSettings()">💾 Save Settings</button>
        </div>
        <div class="card"><h3>💾 Data Management</h3>
            <div class="btn-row">
                <button class="btn btn-success" onclick="backupData()">📥 Backup All Data</button>
                <button class="btn btn-warning" onclick="document.getElementById('restoreFile').click()">📤 Restore Backup</button>
                <input type="file" id="restoreFile" accept=".json" style="display:none;" onchange="restoreData(event)">
                <button class="btn btn-danger" onclick="clearAllData()">🗑 Clear All Data</button>
            </div>
        </div>
    </div>
    <div class="toast" id="toast"></div>
    <script>
        var user = JSON.parse(localStorage.getItem('sms_current_user') || '{}');
if (!user.role || user.role !== 'Admin') {
    alert('⛔ Access Denied!');
    window.location.href = '../index.html';
}
        function saveSettings() {
            var settings={name:document.getElementById('schoolName').value,address:document.getElementById('schoolAddress').value,phone:document.getElementById('schoolPhone').value,email:document.getElementById('schoolEmail').value};
            localStorage.setItem('sms_settings',JSON.stringify(settings));showToast('✅ Settings saved!');
        }
        function backupData() {
            var data={students:JSON.parse(localStorage.getItem('sms_students')||'[]'),sba:JSON.parse(localStorage.getItem('sms_sba')||'[]'),exams:JSON.parse(localStorage.getItem('sms_exams')||'[]'),fees:JSON.parse(localStorage.getItem('sms_fees')||'[]'),payroll:JSON.parse(localStorage.getItem('sms_payroll')||'[]'),users:JSON.parse(localStorage.getItem('sms_users')||'[]'),settings:JSON.parse(localStorage.getItem('sms_settings')||'{}')};
            var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='school_backup_'+new Date().toISOString().slice(0,10)+'.json';document.body.appendChild(a);a.click();document.body.removeChild(a);showToast('✅ Backup downloaded!');
        }
        function restoreData(e){var f=e.target.files[0];if(!f)return;if(!confirm('⚠️ Overwrite all data?')){e.target.value='';return;}var r=new FileReader();r.onload=function(ev){try{var d=JSON.parse(ev.target.result);Object.keys(d).forEach(function(k){localStorage.setItem('sms_'+k,JSON.stringify(d[k]));});alert('✅ Restored! Reloading...');location.reload();}catch(err){alert('❌ Invalid file!');}};r.readAsText(f);e.target.value='';}
        function clearAllData(){if(!confirm('⚠️⚠️ DELETE ALL DATA?'))return;if(!confirm('FINAL: This cannot be undone!'))return;['sms_students','sms_sba','sms_exams','sms_fees','sms_payroll','sms_users','sms_settings'].forEach(function(k){localStorage.removeItem(k);});alert('✅ All data cleared!');location.reload();}
        function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(function(){t.style.display='none';},2500);}
        window.onload=function(){var s=JSON.parse(localStorage.getItem('sms_settings')||'{}');document.getElementById('schoolName').value=s.name||'';document.getElementById('schoolAddress').value=s.address||'';document.getElementById('schoolPhone').value=s.phone||'';document.getElementById('schoolEmail').value=s.email||'';};
    </script>
</body>
</html>
