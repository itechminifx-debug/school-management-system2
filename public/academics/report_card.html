<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Card | School Management System</title>
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --primary: #0d9488; --primary-dark: #0f766e; --success: #059669; --danger: #dc2626; --text: #1e293b; --text-light: #64748b; --border: #e2e8f0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
        body { background: var(--bg); min-height: 100vh; padding: 20px; }
        .action-bar { max-width: 900px; margin: 0 auto 20px; display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { padding: 10px 18px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; color: white; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
        .btn-print { background: #1e293b; } .btn-back { background: #64748b; }
        .btn:hover { transform: translateY(-1px); }
        .report-card { max-width: 900px; margin: 0 auto; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); overflow: hidden; }
        .report-header { background: linear-gradient(135deg, #0d9488, #0f766e); color: white; padding: 25px 30px; text-align: center; }
        .report-header h1 { font-size: 20px; font-weight: 800; text-transform: uppercase; }
        .report-header h2 { font-size: 13px; opacity: 0.9; margin-top: 4px; }
        .report-header .badge { width: 60px; height: 60px; background: white; border-radius: 50%; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 28px; color: var(--primary); }
        .student-info { padding: 18px 30px; background: #f0fdfa; border-bottom: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 20px; font-size: 13px; }
        .student-info .item { color: var(--text-light); } .student-info .item strong { color: var(--text); }
        .report-body { padding: 20px 30px; }
        .section-title { font-size: 14px; font-weight: 700; color: var(--primary); margin: 16px 0 10px; padding-bottom: 6px; border-bottom: 2px solid var(--primary); text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 15px; }
        table th { background: var(--primary); color: white; padding: 8px 6px; text-align: center; font-size: 9px; text-transform: uppercase; }
        table td { padding: 6px; border: 1px solid var(--border); text-align: center; }
        table td.subject { text-align: left; font-weight: 600; }
        .summary-box { background: linear-gradient(135deg, #0d9488, #0f766e); color: white; padding: 16px 20px; border-radius: 10px; text-align: center; margin: 15px 0; }
        .summary-box .big { font-size: 32px; font-weight: 800; }
        .summary-box .label { font-size: 11px; opacity: 0.85; text-transform: uppercase; }
        .signatures { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-top: 30px; text-align: center; }
        .sig-line { border-top: 1px solid #333; padding-top: 6px; font-size: 11px; color: var(--text-light); }
        .selector-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
        .form-group label { display: block; font-size: 10px; font-weight: 700; color: var(--text); text-transform: uppercase; margin-bottom: 4px; }
        .form-group select { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 8px; font-size: 14px; background: #f8fafc; }
        .form-group select:focus { outline: none; border-color: var(--primary); }
        .empty-state { text-align: center; padding: 40px; color: var(--text-light); }
        @media print { body { background: white; padding: 0; } .action-bar, .selector-row { display: none !important; } .report-card { box-shadow: none; border-radius: 0; } .report-header { background: #0d9488 !important; -webkit-print-color-adjust: exact; } }
    </style>
</head>
<body>
    <div class="action-bar">
        <button class="btn btn-print" onclick="window.print()">🖨️ Print Report</button>
        <a href="../dashboard.html" class="btn btn-back">🏠 Dashboard</a>
    </div>
    <div class="report-card">
        <div class="report-header"><div class="badge">🏫</div><h1>Living Spring Adventist Academy</h1><h2>End of Term Report Card</h2></div>
        <div style="padding:20px 30px;background:#f8fafc;border-bottom:1px solid var(--border);">
            <div class="selector-row">
                <div class="form-group"><label>📚 Select Class</label><select id="rptClass" onchange="loadStudentDropdown()"><option value="">-- Select Class --</option><option value="Crèche">Crèche</option><option value="Nursery 1">Nursery 1</option><option value="Nursery 2">Nursery 2</option><option value="KG 1">KG 1</option><option value="KG 2">KG 2</option><option value="Basic 1">Basic 1</option><option value="Basic 2">Basic 2</option><option value="Basic 3">Basic 3</option><option value="Basic 4">Basic 4</option><option value="Basic 5">Basic 5</option><option value="Basic 6">Basic 6</option><option value="JHS 1">JHS 1</option><option value="JHS 2">JHS 2</option><option value="JHS 3">JHS 3</option></select></div>
                <div class="form-group"><label>👤 Select Student</label><select id="rptStudent" onchange="loadReport()"><option value="">-- Select Student --</option></select></div>
            </div>
            <p style="font-size:12px;color:var(--text-light);margin-top:8px;" id="studentCount"></p>
        </div>
        <div id="reportContent"><div class="empty-state"><p style="font-size:16px;">👆 Select a class and student to view their report card.</p></div></div>
    </div>
    <script>
        function getStudents() { var d=localStorage.getItem('sms_students'); return d?JSON.parse(d):[]; }
        function getSBAData() { var d=localStorage.getItem('sms_sba'); return d?JSON.parse(d):[]; }
        function getExamData() { var d=localStorage.getItem('sms_exams'); return d?JSON.parse(d):[]; }

        function loadStudentDropdown() {
            var cls=document.getElementById('rptClass').value, sel=document.getElementById('rptStudent'), countEl=document.getElementById('studentCount');
            sel.innerHTML='<option value="">-- Select Student --</option>';
            if(!cls){countEl.textContent='';document.getElementById('reportContent').innerHTML='<div class="empty-state"><p>👆 Select a class and student.</p></div>';return;}
            var classStudents=getStudents().filter(function(s){return s.class===cls||s.className===cls||s.studentClass===cls;});
            countEl.textContent='📋 '+classStudents.length+' students found';
            if(classStudents.length===0){sel.innerHTML='<option value="">-- No students --</option>';return;}
            classStudents.sort(function(a,b){var na=(a.firstName||a.name||'')+' '+(a.lastName||'');var nb=(b.firstName||b.name||'')+' '+(b.lastName||'');return na.localeCompare(nb);});
            classStudents.forEach(function(s){var n=(s.firstName||s.name||'')+' '+(s.lastName||'');sel.innerHTML+='<option value="'+s.id+'">'+n.trim()+'</option>';});
            document.getElementById('reportContent').innerHTML='<div class="empty-state"><p>👆 Now select a student.</p></div>';
        }

        function loadReport() {
            var studentId=document.getElementById('rptStudent').value; if(!studentId) return;
            var student=getStudents().find(function(s){return s.id===studentId;}); if(!student){document.getElementById('reportContent').innerHTML='<div class="empty-state"><p>Student not found!</p></div>';return;}
            var sbaData=getSBAData().filter(function(d){return d.studentId===studentId;});
            var examData=getExamData().filter(function(d){return d.studentId===studentId;});
            var subjects=[];
            sbaData.forEach(function(d){if(subjects.indexOf(d.subject)===-1)subjects.push(d.subject);});
            examData.forEach(function(d){if(subjects.indexOf(d.subject)===-1)subjects.push(d.subject);});
            var studentName=((student.firstName||student.name||'')+' '+(student.lastName||'')).trim();
            var html='<div class="student-info"><div class="item">📛 <strong>'+studentName+'</strong></div><div class="item">🆔 <strong>'+(student.id||'N/A')+'</strong></div><div class="item">🏫 <strong>'+(student.class||student.className||'')+'</strong></div></div>';
            html+='<div class="report-body"><div class="section-title">📖 Academic Performance</div>';
            if(subjects.length===0){html+='<p style="text-align:center;padding:20px;color:#999;">No data found.</p>';}
            else {
                html+='<table><thead><tr><th>Subject</th><th>Test 1 (15)</th><th>Group (15)</th><th>Test 2 (15)</th><th>Project (15)</th><th>SBA Total (60)</th><th>Class 50%</th><th>Exam 100%</th><th>Exam 50%</th><th>Total 100%</th><th>Grade</th><th>Position</th><th>Remarks</th></tr></thead><tbody>';
                var totalSum=0,count=0;
                subjects.forEach(function(subject){
                    var sba=sbaData.find(function(d){return d.subject===subject;})||{};
                    var exam=examData.find(function(d){return d.subject===subject;})||{};
                    var sbaTotal=parseFloat(sba.subTotal)||0;
                    var classA=parseFloat(sba.classA)||((sbaTotal/60)*50).toFixed(1);
                    
                    // 🔥 FIX: Read exam score from ALL possible field names
                    var examScore=parseFloat(exam.examScore)||parseFloat(exam.exam)||parseFloat(exam.ExamScore)||parseFloat(exam.Exam)||parseFloat(exam.score)||parseFloat(exam.exam_score)||0;
                    var examB=parseFloat(exam.examB)||((examScore/100)*50).toFixed(1);
                    var total=parseFloat(sba.total)||(parseFloat(classA)+parseFloat(examB)).toFixed(1);
                    var grade=getGrade(parseFloat(total)), remarks=getRemarks(parseFloat(total));
                    if(total>0){totalSum+=total;count++;}
                    html+='<tr><td class="subject">'+subject+'</td>';
                    html+='<td>'+(sba.test1||'-')+'</td><td>'+(sba.groupWork||'-')+'</td><td>'+(sba.test2||'-')+'</td><td>'+(sba.project||'-')+'</td>';
                    html+='<td><strong>'+(sba.subTotal||'-')+'</strong></td><td>'+classA+'</td>';
                    html+='<td><strong>'+(examScore>0?examScore:'-')+'</strong></td><td>'+examB+'</td>';
                    html+='<td><strong>'+total+'</strong></td><td><strong>'+grade+'</strong></td>';
                    html+='<td>'+(sba.position||exam.position||'-')+'</td><td>'+remarks+'</td></tr>';
                });
                html+='</tbody></table>';
                var average=count>0?(totalSum/count).toFixed(1):0;
                html+='<div class="summary-box"><div class="label">Overall Average</div><div class="big">'+average+'%</div><div style="margin-top:6px;">Grade: '+getGrade(parseFloat(average))+' - '+getRemarks(parseFloat(average))+'</div></div>';
            }
            html+='<div class="signatures"><div class="sig-line">Class Teacher</div><div class="sig-line">Head Teacher</div><div class="sig-line">Parent/Guardian</div></div></div>';
            document.getElementById('reportContent').innerHTML=html;
        }

        function getGrade(s){if(s>=80)return 1;if(s>=70)return 2;if(s>=60)return 3;if(s>=50)return 4;if(s>=40)return 5;return 6;}
        function getRemarks(s){if(s>=80)return'Excellent';if(s>=70)return'Very Good';if(s>=60)return'Good';if(s>=50)return'Average';if(s>=40)return'Below Average';return'Weak';}
        window.onload=function(){document.getElementById('rptClass').value='';};
    </script>
</body>
</html>
